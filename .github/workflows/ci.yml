name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      LOG_LEVEL: info
      CLIENT_SECRET: ci-placeholder
      DATABASE_URL: postgresql://player:p@localhost:5432/player
      DATABASE_URL_ADMIN: postgresql://player:p@localhost:5432/player

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        run: bunx prisma validate --schema prisma/schema.prisma

      - name: Check formatting
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run tsc

      - name: Unit tests
        run: bun vitest --project unit --run

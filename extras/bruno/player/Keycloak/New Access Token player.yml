info:
  name: New Access Token player
  type: http
  seq: 3

http:
  method: POST
  url: "{{tokenUrl}}"
  body:
    type: form-urlencoded
    data:
      - name: username
        value: user
      - name: password
        value: p

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.access_token
      operator: matches
      value: .+\..+\..+

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

opencollection: 1.0.0

info:
  name: player

request:
  variables:
    - name: baseUrl
      value: https://localhost:3000
    - name: restUrl
      value: "{{baseUrl}}/rest/player"
    - name: graphqlUrl
      value: "{{baseUrl}}/graphql"
    - name: keycloakUrl
      value: http://localhost:8880
    - name: realm
      value: javascript
    - name: realmUrl
      value: "{{keycloakUrl}}/realms/{{realm}}"
    - name: oidcUrl
      value: "{{realmUrl}}/protocol/openid-connect"
    - name: oidcAuthUrl
      value: "{{oidcUrl}}/auth"
    - name: oidcTokenUrl
      value: "{{oidcUrl}}/token"
    - name: tokenUrl
      value: "{{baseUrl}}/auth/token"
    - name: clientId
      value: javascript-client
    - name: clientSecret
      value: 0oSEd7oLFb3NBUywGhPmyLksV29RWCfS
    - name: username
      value: admin
    - name: password
      value: p
    - name: playerUsername
      value: user
    - name: playerPassword
      value: p

bundled: false

extensions:
  bruno:
    ignore:
      - node_modules
      - .git

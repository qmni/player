opencollection: 1.0.0

info:
  name: player

request:
  variables:
    - name: baseUrl
      value: https://localhost:3000
    - name: restUrl
      value: "{{baseUrl}}/rest/player"
    - name: graphqlUrl
      value: "{{baseUrl}}/graphql"
    - name: keycloakUrl
      value: https://localhost:8843
    - name: realm
      value: javascript
    - name: realmUrl
      value: "{{keycloakUrl}}/realms/{{realm}}"
    - name: oidcUrl
      value: "{{realmUrl}}/protocol/openid-connect"
    - name: oidcAuthUrl
      value: "{{oidcUrl}}/auth"
    - name: oidcTokenUrl
      value: "{{oidcUrl}}/token"
    - name: keycloakUrl
      value: http://localhost:8880
      disabled: true

bundled: false

extensions:
  bruno:
    ignore:
      - node_modules
      - .git

info:
  name: Player 80 löschen
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: Accept
      value: application/graphql-response+json
  body:
    query: |-
      mutation {
        delete(id: "80") {
          success
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/graphql-response\+json(; charset=utf-8)?$
    - expression: res.body.data.delete.success
      operator: eq
      value: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: Neuer Player als user
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: Accept
      value: application/graphql-response+json
  body:
    query: |-
      mutation {
        create(
          input: {
            username: "graphql-user-player",
            email: "graphql-user-player@example.com",
            level: 12,
            experience: 1800,
            playerClass: ROGUE,
            status: ACTIVE
          }
        ) {
          id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data.create.id
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

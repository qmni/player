info:
  name: Create Player
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/graphql"
  auth: inherit
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: Accept
      value: application/graphql-response+json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "query": "mutation Create($input: PlayerNeuInput!) { create(input: $input) { id } }",
        "variables": {
          "input": {
            "username": "graphql-player",
            "email": "graphql-player@example.com",
            "level": 12,
            "experience": 1800,
            "playerClass": "ROGUE",
            "status": "ACTIVE"
          }
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

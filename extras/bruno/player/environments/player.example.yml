name: player.example
variables:
  - name: baseUrl
    value: https://localhost:3000
  - name: keycloakUrl
    value: http://localhost:8880
  - name: realm
    value: javascript
  - name: realmUrl
    value: "{{keycloakUrl}}/realms/{{realm}}"
  - name: oidcUrl
    value: "{{realmUrl}}/protocol/openid-connect"
  - name: oidcTokenUrl
    value: "{{oidcUrl}}/token"
  - name: tokenUrl
    value: "{{baseUrl}}/auth/token"
  - name: clientId
    value: javascript-client
  - secret: true
    name: clientSecret
    value: CHANGE_ME
  - name: username
    value: admin
  - secret: true
    name: password
    value: p
  - name: playerUsername
    value: user
  - secret: true
    name: playerPassword
    value: p
  - secret: true
    name: accessToken
    value: PASTE_ACCESS_TOKEN_HERE
  - name: playerId
    value: "1"
  - name: playerVersion
    value: "0"

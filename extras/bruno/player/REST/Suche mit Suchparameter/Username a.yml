info:
  name: Username a
  type: http
  seq: 1

http:
  method: GET
  url: "{{restUrl}}"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: username
      value: a
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.content
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

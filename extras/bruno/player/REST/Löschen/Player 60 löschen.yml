info:
  name: Player 60 löschen
  type: http
  seq: 1

http:
  method: DELETE
  url: "{{restUrl}}/:id"
  params:
    - name: id
      value: "60"
      type: path
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

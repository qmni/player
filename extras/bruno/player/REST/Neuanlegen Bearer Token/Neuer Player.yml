info:
  name: Neuer Player
  type: http
  seq: 1

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "bruno-player",
        "email": "bruno-player@example.com",
        "level": 10,
        "experience": 1000,
        "playerClass": "MAGE",
        "status": "ACTIVE"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers.location
      operator: matches
      value: /rest\/player\/[1-9]\d*$
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

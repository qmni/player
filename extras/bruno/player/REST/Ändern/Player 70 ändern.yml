info:
  name: Player 70 ändern
  type: http
  seq: 1

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: Content-Type
      value: application/json
    - name: If-Match
      value: '"0"'
  params:
    - name: id
      value: "70"
      type: path
  body:
    type: json
    data: |-
      {
        "username": "bruno-update",
        "email": "bruno-update@example.com",
        "level": 20,
        "experience": 2000,
        "playerClass": "PRIEST",
        "status": "ACTIVE"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
